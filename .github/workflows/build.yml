name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: EXE 빌드
        shell: cmd
        run: pyinstaller --onefile --windowed --name bnkrmall-monitor --hidden-import tkinter monitor.py

      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: bnkrmall-monitor-exe
          path: dist/bnkrmall-monitor.exe

      - name: 릴리즈 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "bnkrmall Monitor v${{ github.run_number }}"
          files: dist/bnkrmall-monitor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
